version: "3.0"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ct-postgres
    environment:
      POSTGRES_DB: compliance_tower
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ct-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ct-api
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/migrations:/app/migrations
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: compliance_tower
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-secret-change-in-production
      CORS_ORIGIN: http://localhost:5173
      LOG_LEVEL: debug
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    depends_on:
      - postgres
      - redis
    command: ["sh", "-c", "node node_modules/tsx/dist/cli.mjs src/scripts/runMigrations.ts && npm run dev"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ct-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    environment:
      API_PROXY_TARGET: http://api:3000
      VITE_API_URL: ""
    depends_on:
      - api

volumes:
  postgres_data:

name: CI

on:
  push:
    branches: [main, "sprint-**"]
  pull_request:
    branches: [main]

env:
  DB_HOST: localhost
  DB_PORT: 5432
  DB_NAME: compliance_tower
  DB_USER: postgres
  DB_PASSWORD: postgres
  REDIS_HOST: localhost
  REDIS_PORT: 6379
  NODE_ENV: test
  JWT_SECRET: ci-test-secret
  CORS_ORIGIN: http://localhost:5173

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: compliance_tower
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx tsx src/scripts/runMigrations.ts
      - run: npx tsc --noEmit
        continue-on-error: true
      - run: npx vitest run --reporter=verbose

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
        continue-on-error: true
      - run: npx vitest run --reporter=verbose
      - run: npx vite build

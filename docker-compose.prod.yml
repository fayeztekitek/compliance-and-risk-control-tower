version: "3.9"

services:
  postgres:
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-compliance_tower}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 2G

  redis:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  api:
    build:
      target: production
    restart: always
    environment:
      NODE_ENV: production
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      LOG_LEVEL: info
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
    command: ["node", "dist/index.js"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r => process.exit(r.ok?0:1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      target: production
    restart: always
    ports:
      - "80:80"
    environment:
      VITE_API_URL: ${API_URL:-https://api.example.com}

volumes:
  postgres_prod_data:
